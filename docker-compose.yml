version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: openadmin-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://openadmin:openadmin_pass_2026@openadmin-db:5432/openadmin
      REDIS_URL: redis://:openadmin_redis_2026@openadmin-redis:6379
      JWT_SECRET: openadmin-jwt-secret-2026-super-secure-key
      PORT: 3000
      NODE_ENV: production
    depends_on:
      openadmin-db:
        condition: service_healthy
      openadmin-redis:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/auth/me || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: openadmin-web
    ports:
      - "4321:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      NODE_ENV: production
      PUBLIC_API_URL: http://openadmin-api:3000
    depends_on:
      - api
    restart: on-failure

  openadmin-db:
    image: postgres:15
    container_name: openadmin-db
    environment:
      POSTGRES_USER: openadmin
      POSTGRES_PASSWORD: openadmin_pass_2026
      POSTGRES_DB: openadmin
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openadmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  openadmin-redis:
    image: redis:7-alpine
    container_name: openadmin-redis
    ports:
      - "56379:6379"
    command: redis-server --requirepass openadmin_redis_2026
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "openadmin_redis_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
